spring.application.name=backend
server.port=8081

# Load key=value pairs from a local .env file (gitignored). The [.properties]
# hint tells Spring Boot to parse the extensionless file in properties format.
# "optional:" means startup won't fail if .env is absent (e.g. on CI, where the
# values come from real environment variables instead).
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
